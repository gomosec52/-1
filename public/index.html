<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameDrop — Игровые Паки</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ФОНОВОЕ ВИДЕО / GIF -->
<div class="bg-overlay"></div>
<div class="bg-wrapper">
  <video autoplay muted loop playsinline class="bg-video" id="bgVideo">
    <source src="https://cdn.jsdelivr.net/gh/Anish-Agnihotri/diagonalley@master/public/videos/background.mp4" type="video/mp4" />
  </video>
  <!-- Fallback gif если видео не грузится -->
  <img class="bg-gif" src="https://media1.tenor.com/m/OBaL_RfkEmwAAAAC/anime-dance.gif" alt="bg" id="bgGif" style="display:none" />
</div>

<!-- СКРИМЕР ОВЕРЛЕЙ -->
<div id="screamer" class="screamer-overlay" style="display:none">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Jeff_the_Killer.jpg/800px-Jeff_the_Killer.jpg" alt="SCREAMER" class="screamer-img" />
  <audio id="screamerSound" src="https://www.myinstants.com/media/sounds/scary-scream.mp3" preload="auto"></audio>
</div>

<!-- ШАПКА -->
<header class="site-header">
  <div class="header-left">
    <a href="pages/secret.html" class="secret-btn">🔒 Секретно</a>
    <nav class="pack-nav" id="packNav">
      <button class="pack-btn active" data-pack="1" onclick="switchPack(1)">Пак Игр 1</button>
      <button class="pack-btn" data-pack="2" onclick="switchPack(2)">Пак Игр 2</button>
      <button class="pack-btn" data-pack="3" onclick="switchPack(3)">Пак Игр 3</button>
      <button class="pack-btn" data-pack="4" onclick="switchPack(4)">Пак Игр 4</button>
      <button class="pack-btn" data-pack="5" onclick="switchPack(5)">Пак Игр 5</button>
    </nav>
  </div>
  <div class="header-right">
    <div id="userPanel" style="display:none" class="user-panel">
      <img id="userAvatar" src="" alt="avatar" class="user-avatar" />
      <div class="user-info">
        <span id="userNick" class="user-nick"></span>
        <span id="userId" class="user-id"></span>
      </div>
      <button onclick="logout()" class="logout-btn">Выйти</button>
      <button id="adminBtn" onclick="location.href='pages/admin.html'" class="admin-btn" style="display:none">⚙ Админ</button>
    </div>
    <div id="authButtons" class="auth-buttons">
      <button onclick="loginDiscord()" class="btn-discord">
        <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
        Войти через Discord
      </button>
      <button onclick="showRegisterForm()" class="btn-register">Регистрация</button>
      <button onclick="showLoginForm()" class="btn-login">Войти</button>
    </div>
  </div>
</header>

<!-- МОДАЛКА РЕГИСТРАЦИИ -->
<div id="modalRegister" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modalRegister')">✕</button>
    <h2 class="modal-title">Регистрация</h2>
    <input type="text" id="regNick" placeholder="Ник" class="modal-input" maxlength="20" />
    <input type="password" id="regPass" placeholder="Пароль" class="modal-input" />
    <div id="regError" class="modal-error"></div>
    <button onclick="doRegister()" class="modal-btn">Зарегистрироваться</button>
  </div>
</div>

<!-- МОДАЛКА ВХОДА -->
<div id="modalLogin" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modalLogin')">✕</button>
    <h2 class="modal-title">Вход</h2>
    <input type="text" id="loginNick" placeholder="Ник" class="modal-input" />
    <input type="password" id="loginPass" placeholder="Пароль" class="modal-input" />
    <div id="loginError" class="modal-error"></div>
    <button onclick="doLogin()" class="modal-btn">Войти</button>
  </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<main class="main-content" id="mainContent">
  <div class="pack-header">
    <h1 class="pack-title" id="packTitle">ПАК ИГР 1</h1>
  </div>
  <div class="games-list" id="gamesList">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Загрузка игр...</p>
    </div>
  </div>
</main>

<!-- ЧАТ -->
<div class="chat-widget" id="chatWidget">
  <div class="chat-header" onclick="toggleChat()">
    <span>💬 Чат</span>
    <span id="chatToggleIcon">▲</span>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Написать..." class="chat-input" maxlength="200" onkeydown="if(event.key==='Enter')sendChat()" />
      <button onclick="sendChat()" class="chat-send">➤</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/games.js"></script>
<script src="js/chat.js"></script>
<script src="js/main.js"></script>
</body>
</html>
