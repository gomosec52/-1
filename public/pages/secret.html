<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔒 Секретная страница</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .secret-page { position:relative; z-index:10; min-height:100vh; padding:80px 24px 60px; }
    .secret-title {
      font-family:'Orbitron',sans-serif; font-size:28px; color:var(--pink);
      text-align:center; margin-bottom:8px; text-shadow:var(--glow-pink);
    }
    .secret-sub { text-align:center; color:var(--text2); margin-bottom:36px; font-size:15px; }
    .back-btn {
      display:inline-block; margin-bottom:28px;
      background:rgba(255,79,163,0.1); border:1.5px solid var(--pink);
      color:var(--pink); padding:8px 20px; border-radius:20px;
      text-decoration:none; font-family:'Rajdhani',sans-serif; font-weight:700;
      -webkit-transition:all .2s; transition:all .2s;
    }
    .back-btn:hover { background:rgba(255,79,163,0.25); -webkit-box-shadow:var(--glow-pink); box-shadow:var(--glow-pink); }

    .gallery {
      display:-webkit-flex; display:-ms-flexbox; display:flex;
      -webkit-flex-wrap:wrap; flex-wrap:wrap;
      gap:16px;
    }
    .gallery-item {
      width: calc(25% - 12px);
      min-width: 180px;
      border-radius:14px; overflow:hidden; border:1.5px solid var(--border);
      -webkit-transition:all .3s; transition:all .3s; cursor:pointer;
      background:#12001f; aspect-ratio: 3/4;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      position: relative;
    }
    .gallery-item:hover { border-color:var(--pink); -webkit-transform:translateY(-4px); transform:translateY(-4px); -webkit-box-shadow:var(--glow-pink); box-shadow:var(--glow-pink); }
    .gallery-item img { width:100%; height:100%; -o-object-fit:cover; object-fit:cover; display:block; }
    .gallery-item .img-label {
      position:absolute; bottom:0; left:0; right:0;
      background: -webkit-linear-gradient(transparent, rgba(10,0,30,0.9));
      background: linear-gradient(transparent, rgba(10,0,30,0.9));
      color:var(--pink); text-align:center; padding:18px 8px 10px;
      font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700;
      letter-spacing:1px;
    }

    /* Лайтбокс */
    .lightbox {
      position:fixed; top:0;left:0;right:0;bottom:0; z-index:9000;
      background:rgba(0,0,0,0.92); display:none;
      -webkit-align-items:center; align-items:center;
      -webkit-justify-content:center; justify-content:center;
      -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    }
    .lightbox.open { display:-webkit-flex; display:-ms-flexbox; display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:12px; border:2px solid var(--pink); -o-object-fit:contain; object-fit:contain; }
    .lightbox-close {
      position:absolute; top:20px; right:24px; font-size:28px; color:var(--text2);
      cursor:pointer; background:none; border:none;
    }
    .lightbox-close:hover { color:var(--pink); }
    .lightbox-nav {
      position:absolute; top:50%; -webkit-transform:translateY(-50%); transform:translateY(-50%);
      background:rgba(255,79,163,0.2); border:1.5px solid var(--pink);
      color:var(--pink); font-size:24px; padding:10px 16px; border-radius:8px;
      cursor:pointer; -webkit-transition:all .2s; transition:all .2s;
    }
    .lightbox-nav:hover { background:rgba(255,79,163,0.4); }
    .lightbox-prev { left:20px; }
    .lightbox-next { right:20px; }

    @media(max-width:700px) {
      .gallery-item { width: calc(50% - 8px); min-width: 140px; }
    }
    @media(max-width:400px) {
      .gallery-item { width: calc(50% - 6px); min-width: 120px; }
    }
  </style>
</head>
<body>
<div class="bg-wrapper">
  <img class="bg-gif"
       src="https://media.tenor.com/OBaL_RfkEmwAAAAd/anime-dance.gif"
       alt="bg" style="display:block"
       onerror="this.src='https://media1.tenor.com/m/OBaL_RfkEmwAAAAC/anime-dance.gif'"/>
</div>
<div class="bg-overlay"></div>

<div class="secret-page">
  <a href="../index.html" class="back-btn">← Назад</a>
  <h1 class="secret-title">🔒 СЕКРЕТНАЯ СТРАНИЦА</h1>
  <p class="secret-sub">Blue Archive — галерея</p>

  <div class="gallery" id="gallery"></div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLight(-1);event.stopPropagation()">❮</button>
  <img id="lightboxImg" src="" alt="" />
  <button class="lightbox-nav lightbox-next" onclick="navLight(1);event.stopPropagation()">❯</button>
</div>

<script>
// ================================================================
// Blue Archive — иконки с Fandom CDN (static.wikia.nocookie.net)
// Формат: статичные прямые ссылки, не зависящие от JavaScript
// ================================================================
var IMAGES = [
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/f/ff/Yuuka_Icon.png/revision/latest?cb=20210201103951',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/b/b6/Yuuka_Portrait.png/revision/latest?cb=20220420081653',
    title: 'Yuuka'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/7/79/Shiroko_Icon.png/revision/latest?cb=20210201103817',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/a/ad/Shiroko_Portrait.png/revision/latest?cb=20220420081547',
    title: 'Shiroko'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/6/65/Aris_Icon.png/revision/latest?cb=20210201103835',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/9/90/Aris_Portrait.png/revision/latest?cb=20220420075754',
    title: 'Aris'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/c/ca/Hoshino_Icon.png/revision/latest?cb=20210201103906',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/3/38/Hoshino_Portrait.png/revision/latest?cb=20220420080128',
    title: 'Hoshino'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/4/49/Nonomi_Icon.png/revision/latest?cb=20210201103924',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/5/52/Nonomi_Portrait.png/revision/latest?cb=20220420081018',
    title: 'Nonomi'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/1/15/Serika_Icon.png/revision/latest?cb=20210201103851',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/d/d5/Serika_Portrait.png/revision/latest?cb=20220420081439',
    title: 'Serika'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/d/d4/Neru_Icon.png/revision/latest?cb=20220318130913',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/4/49/Neru_Portrait.png/revision/latest?cb=20220420080936',
    title: 'Neru'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/0/04/Mutsuki_Icon.png/revision/latest?cb=20210201103918',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/2/2a/Mutsuki_Portrait.png/revision/latest?cb=20220420080854',
    title: 'Mutsuki'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/3/3c/Kayoko_Icon.png/revision/latest?cb=20210201103909',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/9/90/Kayoko_Portrait.png/revision/latest?cb=20220420080428',
    title: 'Kayoko'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/3/33/Ako_Icon.png/revision/latest?cb=20210201103829',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/8/83/Ako_Portrait.png/revision/latest?cb=20220420075654',
    title: 'Ako'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/e/e6/Kotama_Icon.png/revision/latest?cb=20210201103913',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/d/d2/Kotama_Portrait.png/revision/latest?cb=20220420080528',
    title: 'Kotama'
  },
  {
    src: 'https://static.wikia.nocookie.net/blue-archive/images/f/fc/Haruna_Icon.png/revision/latest?cb=20210201103902',
    full: 'https://static.wikia.nocookie.net/blue-archive/images/3/38/Haruna_Portrait.png/revision/latest?cb=20220420080054',
    title: 'Haruna'
  },
];

var currentIdx = 0;

function buildGallery() {
  var g = document.getElementById('gallery');
  g.innerHTML = '';

  IMAGES.forEach(function(img, i) {
    var div = document.createElement('div');
    div.className = 'gallery-item';
    div.onclick = (function(idx) { return function() { openLight(idx); }; })(i);

    var el = document.createElement('img');
    el.alt = img.title;
    el.loading = 'lazy';
    el.crossOrigin = 'anonymous';

    // Попробуем иконку, при ошибке — фоллбэк на API аватар
    el.onerror = (function(idx, name) {
      return function() {
        this.onerror = null;
        this.src = 'https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(name) + '&backgroundColor=0a0030';
      };
    })(i, img.title);
    el.src = img.src;

    var label = document.createElement('div');
    label.className = 'img-label';
    label.textContent = img.title;

    div.appendChild(el);
    div.appendChild(label);
    g.appendChild(div);
  });
}

function openLight(idx) {
  currentIdx = idx;
  var imgEl = document.getElementById('lightboxImg');
  // Показываем полноразмерный портрет или иконку
  imgEl.src = IMAGES[idx].full || IMAGES[idx].src;
  imgEl.onerror = function() {
    this.onerror = null;
    this.src = IMAGES[idx].src;
  };
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}

function navLight(dir) {
  currentIdx = (currentIdx + dir + IMAGES.length) % IMAGES.length;
  openLight(currentIdx);
}

document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  navLight(-1);
  if (e.key === 'ArrowRight') navLight(1);
  if (e.key === 'Escape')     lb.classList.remove('open');
});

buildGallery();
</script>
</body>
</html>
