<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Discord авторизация...</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
  <style>
    body { background: #0a0012; color: #f0e6ff; font-family: 'Orbitron',sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
    .spin { width:48px;height:48px;border:4px solid #2a003f;border-top-color:#ff4fa3;border-radius:50%;
            animation:spin .8s linear infinite;margin:0 auto 24px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color: #b39ddb; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
<div>
  <div class="spin"></div>
  <div style="color:#00e5ff;font-size:18px">Авторизация через Discord...</div>
  <p id="status">Получаем данные...</p>
</div>

<script src="../js/config.js"></script>
<script>
(async () => {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');

  if (!accessToken) {
    document.getElementById('status').textContent = 'Ошибка: токен не получен';
    setTimeout(() => { window.location.href = '../index.html'; }, 2000);
    return;
  }

  // Получаем данные пользователя с Discord
  const discordRes = await fetch('https://discord.com/api/v10/users/@me', {
    headers: { Authorization: `Bearer ${accessToken}` }
  });

  if (!discordRes.ok) {
    document.getElementById('status').textContent = 'Ошибка Discord API';
    setTimeout(() => { window.location.href = '../index.html'; }, 2000);
    return;
  }

  const disc = await discordRes.json();
  const discord_id  = disc.id;
  const nick        = disc.global_name || disc.username;
  const avatar_hash = disc.avatar;
  const avatar_url  = avatar_hash
    ? `https://cdn.discordapp.com/avatars/${discord_id}/${avatar_hash}.png?size=128`
    : `https://cdn.discordapp.com/embed/avatars/${parseInt(discord_id) % 5}.png`;

  // Проверяем/создаём пользователя в Supabase
  const SUPA_URL = CONFIG.SUPABASE_URL;
  const SUPA_KEY = CONFIG.SUPABASE_ANON;

  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${SUPA_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  };

  // Ищем существующего пользователя
  const check = await fetch(`${SUPA_URL}/rest/v1/users?discord_id=eq.${discord_id}&select=*`, { headers });
  const existing = await check.json();

  let user;
  if (Array.isArray(existing) && existing.length > 0) {
    user = existing[0];
    // Обновляем аватар и ник
    await fetch(`${SUPA_URL}/rest/v1/users?id=eq.${user.id}`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ nick, avatar_url })
    });
    user.nick = nick;
    user.avatar_url = avatar_url;
  } else {
    // Генерируем site_id
    const site_id = 'GD-' + Math.random().toString(36).substring(2, 9).toUpperCase();
    const createRes = await fetch(`${SUPA_URL}/rest/v1/users`, {
      method: 'POST', headers,
      body: JSON.stringify({
        discord_id, nick, avatar_url, site_id,
        auth_type: 'discord',
        created_at: new Date().toISOString(),
      })
    });
    const created = await createRes.json();
    user = Array.isArray(created) ? created[0] : created;
  }

  // Сохраняем сессию
  localStorage.setItem('gd_user', JSON.stringify({
    nick:       user.nick,
    site_id:    user.site_id,
    avatar_url: user.avatar_url,
    discord_id: user.discord_id,
    auth_type:  'discord',
    db_id:      user.id,
  }));

  document.getElementById('status').textContent = `Привет, ${nick}! Перенаправляем...`;
  setTimeout(() => { window.location.href = '../index.html'; }, 800);
})();
</script>
</body>
</html>
