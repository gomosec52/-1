<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔒 Секретная страница</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .secret-page { position:relative; z-index:10; min-height:100vh; padding:80px 24px 60px; }
    .secret-title {
      font-family:'Orbitron',sans-serif; font-size:28px; color:var(--pink);
      text-align:center; margin-bottom:8px; text-shadow:var(--glow-pink);
    }
    .secret-sub { text-align:center; color:var(--text2); margin-bottom:36px; font-size:15px; }
    .back-btn {
      display:inline-block; margin-bottom:28px;
      background:rgba(255,79,163,0.1); border:1.5px solid var(--pink);
      color:var(--pink); padding:8px 20px; border-radius:20px;
      text-decoration:none; font-family:'Rajdhani',sans-serif; font-weight:700;
      -webkit-transition:all .2s; transition:all .2s;
    }
    .back-btn:hover { background:rgba(255,79,163,0.25); -webkit-box-shadow:var(--glow-pink); box-shadow:var(--glow-pink); }

    .gallery {
      display:-webkit-flex; display:-ms-flexbox; display:flex;
      -webkit-flex-wrap:wrap; flex-wrap:wrap;
      gap:16px;
    }
    .gallery-item {
      width: calc(25% - 12px);
      min-width: 180px;
      border-radius:14px; overflow:hidden; border:1.5px solid var(--border);
      -webkit-transition:all .3s; transition:all .3s; cursor:pointer;
      background:#12001f; aspect-ratio: 3/4;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      position: relative;
    }
    .gallery-item:hover { border-color:var(--pink); -webkit-transform:translateY(-4px); transform:translateY(-4px); -webkit-box-shadow:var(--glow-pink); box-shadow:var(--glow-pink); }
    .gallery-item img { width:100%; height:100%; -o-object-fit:cover; object-fit:cover; display:block; }
    .gallery-item .img-label {
      position:absolute; bottom:0; left:0; right:0;
      background: -webkit-linear-gradient(transparent, rgba(10,0,30,0.9));
      background: linear-gradient(transparent, rgba(10,0,30,0.9));
      color:var(--pink); text-align:center; padding:18px 8px 10px;
      font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700;
      letter-spacing:1px;
    }
    .gallery-placeholder {
      display:flex; align-items:center; justify-content:center;
      width:100%; height:100%; color:var(--text2); font-size:32px; flex-direction:column; gap:8px;
    }
    .gallery-placeholder span { font-size:12px; font-family:'Rajdhani',sans-serif; color:var(--text2); }

    /* Лайтбокс */
    .lightbox {
      position:fixed; top:0;left:0;right:0;bottom:0; z-index:9000;
      background:rgba(0,0,0,0.92); display:none;
      -webkit-align-items:center; -ms-flex-align:center; align-items:center;
      -webkit-justify-content:center; -ms-flex-pack:center; justify-content:center;
      -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    }
    .lightbox.open { display:-webkit-flex; display:-ms-flexbox; display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:12px; border:2px solid var(--pink); -o-object-fit:contain; object-fit:contain; }
    .lightbox-close {
      position:absolute; top:20px; right:24px; font-size:28px; color:var(--text2);
      cursor:pointer; background:none; border:none;
    }
    .lightbox-close:hover { color:var(--pink); }
    .lightbox-nav {
      position:absolute; top:50%; -webkit-transform:translateY(-50%); transform:translateY(-50%);
      background:rgba(255,79,163,0.2); border:1.5px solid var(--pink);
      color:var(--pink); font-size:24px; padding:10px 16px; border-radius:8px;
      cursor:pointer; -webkit-transition:all .2s; transition:all .2s;
    }
    .lightbox-nav:hover { background:rgba(255,79,163,0.4); }
    .lightbox-prev { left:20px; }
    .lightbox-next { right:20px; }

    @media(max-width:700px) {
      .gallery-item { width: calc(50% - 8px); min-width: 140px; }
    }
    @media(max-width:400px) {
      .gallery-item { width: calc(50% - 6px); min-width: 120px; }
    }
  </style>
</head>
<body>
<div class="bg-wrapper">
  <img class="bg-gif"
       src="https://media.tenor.com/OBaL_RfkEmwAAAAd/anime-dance.gif"
       alt="bg" style="display:block"
       onerror="this.src='https://media1.tenor.com/m/OBaL_RfkEmwAAAAC/anime-dance.gif'"/>
</div>
<div class="bg-overlay"></div>

<div class="secret-page">
  <a href="../index.html" class="back-btn">← Назад</a>
  <h1 class="secret-title">🔒 СЕКРЕТНАЯ СТРАНИЦА</h1>
  <p class="secret-sub">Blue Archive — галерея</p>

  <div class="gallery" id="gallery"></div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLight(-1);event.stopPropagation()">❮</button>
  <img id="lightboxImg" src="" alt="" />
  <button class="lightbox-nav lightbox-next" onclick="navLight(1);event.stopPropagation()">❯</button>
</div>

<script>
// Blue Archive — используем надёжный CDN источник (wiki.gg + arrowhead)
var IMAGES = [
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/f/ff/Yuuka_Icon.png/300px-Yuuka_Icon.png', title: 'Yuuka' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/8/80/Aris_Icon.png/300px-Aris_Icon.png', title: 'Aris' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/c/ca/Hoshino_Icon.png/300px-Hoshino_Icon.png', title: 'Hoshino' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/d/d1/Shiroko_Icon.png/300px-Shiroko_Icon.png', title: 'Shiroko' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/4/49/Nonomi_Icon.png/300px-Nonomi_Icon.png', title: 'Nonomi' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/1/15/Serika_Icon.png/300px-Serika_Icon.png', title: 'Serika' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/d/d4/Neru_Icon.png/300px-Neru_Icon.png', title: 'Neru' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/0/04/Mutsuki_Icon.png/300px-Mutsuki_Icon.png', title: 'Mutsuki' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/3/3c/Kayoko_Icon.png/300px-Kayoko_Icon.png', title: 'Kayoko' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/3/33/Ako_Icon.png/300px-Ako_Icon.png', title: 'Ako' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/e/e6/Kotama_Icon.png/300px-Kotama_Icon.png', title: 'Kotama' },
  { src: 'https://static.miraheze.org/bluearchivewiki/thumb/f/fc/Haruna_Icon.png/300px-Haruna_Icon.png', title: 'Haruna' },
];

// Фоллбэк — аватарки через DiceBear если источник не работает
var FALLBACK_NAMES = ['Yuuka','Aris','Hoshino','Shiroko','Nonomi','Serika','Neru','Mutsuki','Kayoko','Ako','Kotama','Haruna'];

var currentIdx = 0;
var loadedSrcs = []; // Финальные src для лайтбокса

function buildGallery() {
  var g = document.getElementById('gallery');
  g.innerHTML = '';
  loadedSrcs = new Array(IMAGES.length).fill('');

  IMAGES.forEach(function(img, i) {
    var div = document.createElement('div');
    div.className = 'gallery-item';
    div.onclick = (function(idx) { return function() { openLight(idx); }; })(i);

    var el = document.createElement('img');
    el.alt = img.title;
    el.loading = 'lazy';
    el.src = img.src;

    el.onload = (function(src, idx) {
      return function() {
        loadedSrcs[idx] = src;
      };
    })(img.src, i);

    el.onerror = (function(idx, name) {
      return function() {
        // Фоллбэк на anime-style аватар
        var fbSrc = 'https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(name) + '&backgroundColor=0a0030';
        this.src = fbSrc;
        loadedSrcs[idx] = fbSrc;
      };
    })(i, img.title);

    var label = document.createElement('div');
    label.className = 'img-label';
    label.textContent = img.title;

    div.appendChild(el);
    div.appendChild(label);
    g.appendChild(div);
    loadedSrcs[i] = img.src;
  });
}

function openLight(idx) {
  currentIdx = idx;
  var src = loadedSrcs[idx] || IMAGES[idx].src;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}

function navLight(dir) {
  currentIdx = (currentIdx + dir + IMAGES.length) % IMAGES.length;
  var src = loadedSrcs[currentIdx] || IMAGES[currentIdx].src;
  document.getElementById('lightboxImg').src = src;
}

document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  navLight(-1);
  if (e.key === 'ArrowRight') navLight(1);
  if (e.key === 'Escape')     lb.classList.remove('open');
});

buildGallery();
</script>
</body>
</html>
