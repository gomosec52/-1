<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>🔒 Секретная страница</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .secret-page { position:relative; z-index:10; min-height:100vh; padding:80px 24px 60px; }
    .secret-title {
      font-family:'Orbitron',sans-serif; font-size:28px; color:var(--pink);
      text-align:center; margin-bottom:8px; text-shadow:var(--glow-pink);
    }
    .secret-sub { text-align:center; color:var(--text2); margin-bottom:36px; font-size:15px; }
    .back-btn {
      display:inline-block; margin-bottom:28px; margin-left:0;
      background:rgba(255,79,163,0.1); border:1.5px solid var(--pink);
      color:var(--pink); padding:8px 20px; border-radius:20px;
      text-decoration:none; font-family:'Rajdhani',sans-serif; font-weight:700;
      transition:all .2s;
    }
    .back-btn:hover { background:rgba(255,79,163,0.25); box-shadow:var(--glow-pink); }

    /* Галерея */
    .gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
    .gallery-item {
      border-radius:14px; overflow:hidden; border:1.5px solid var(--border);
      transition:all .3s; cursor:pointer; aspect-ratio:9/13; background:#12001f;
    }
    .gallery-item:hover { border-color:var(--pink); transform:translateY(-4px); box-shadow:var(--glow-pink); }
    .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; }

    /* Лайтбокс */
    .lightbox {
      position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,0.92);
      display:none; align-items:center; justify-content:center;
      backdrop-filter:blur(8px);
    }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:12px; border:2px solid var(--pink); }
    .lightbox-close {
      position:absolute; top:20px; right:24px; font-size:28px; color:var(--text2);
      cursor:pointer; background:none; border:none;
    }
    .lightbox-close:hover { color:var(--pink); }
    .lightbox-nav {
      position:absolute; top:50%; transform:translateY(-50%);
      background:rgba(255,79,163,0.2); border:1.5px solid var(--pink);
      color:var(--pink); font-size:24px; padding:10px 16px; border-radius:8px;
      cursor:pointer; transition:all .2s;
    }
    .lightbox-nav:hover { background:rgba(255,79,163,0.4); }
    .lightbox-prev { left:20px; }
    .lightbox-next { right:20px; }

    @media(max-width:600px) { .gallery { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
<div class="bg-wrapper">
  <img class="bg-gif" src="https://media1.tenor.com/m/OBaL_RfkEmwAAAAC/anime-dance.gif" alt="bg" style="display:block"/>
</div>
<div class="bg-overlay"></div>

<div class="secret-page">
  <a href="../index.html" class="back-btn">← Назад</a>
  <h1 class="secret-title">🔒 СЕКРЕТНАЯ СТРАНИЦА</h1>
  <p class="secret-sub">Blue Archive — галерея</p>

  <div class="gallery" id="gallery"></div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLight(-1);event.stopPropagation()">❮</button>
  <img id="lightboxImg" src="" alt="" />
  <button class="lightbox-nav lightbox-next" onclick="navLight(1);event.stopPropagation()">❯</button>
</div>

<script>
// Blue Archive персонажи — официальные арты / промо-изображения с публичных источников
const IMAGES = [
  { src: 'https://blue-archive.io/wp-content/uploads/2022/10/yuuka_swimsuit_lobby.png',                title: 'Yuuka' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/e/e3/Aris_Icon.png',                   title: 'Aris' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/4/4c/Hoshino_Icon.png',                title: 'Hoshino' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/6/6f/Shiroko_Icon.png',                title: 'Shiroko' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/8/8e/Nonomi_Icon.png',                 title: 'Nonomi' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/1/1a/Serika_Icon.png',                 title: 'Serika' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/d/d1/Neru_Icon.png',                   title: 'Neru' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/5/5c/Mutsuki_Icon.png',                title: 'Mutsuki' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/3/3e/Kayoko_Icon.png',                 title: 'Kayoko' },
  { src: 'https://static.wikia.nocookie.net/blue-archive/images/c/c2/Ako_Icon.png',                    title: 'Ako' },
];

let currentIdx = 0;

function buildGallery() {
  const g = document.getElementById('gallery');
  g.innerHTML = IMAGES.map((img, i) => `
    <div class="gallery-item" onclick="openLight(${i})">
      <img src="${img.src}" alt="${img.title}" loading="lazy"
           onerror="this.parentElement.style.display='none'" />
    </div>`).join('');
}

function openLight(idx) {
  currentIdx = idx;
  document.getElementById('lightboxImg').src = IMAGES[idx].src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}
function navLight(dir) {
  currentIdx = (currentIdx + dir + IMAGES.length) % IMAGES.length;
  document.getElementById('lightboxImg').src = IMAGES[currentIdx].src;
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  navLight(-1);
  if (e.key === 'ArrowRight') navLight(1);
  if (e.key === 'Escape')     lb.classList.remove('open');
});

buildGallery();
</script>
</body>
</html>
