<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>⚙ Админ Панель — GameDrop</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .admin-wrap { position:relative; z-index:10; min-height:100vh; padding:30px 24px 60px; max-width:860px; margin:0 auto; }
    .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
    .admin-title { font-family:'Orbitron',sans-serif; font-size:26px; color:var(--cyan); text-shadow:var(--glow-cyan); }

    .admin-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
    .admin-tab {
      background:transparent; border:1.5px solid var(--border);
      color:var(--text2); padding:8px 18px; border-radius:20px;
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .2s;
    }
    .admin-tab.active { border-color:var(--cyan); color:var(--cyan); background:rgba(0,229,255,0.1); }

    /* Форма */
    .admin-form { background:var(--glass); border:1.5px solid var(--border); border-radius:16px; padding:28px; }
    .form-title { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--pink); margin-bottom:20px; }
    .form-grid  { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-full  { grid-column:1 / -1; }
    .form-label { font-size:12px; color:var(--cyan); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block; }
    .form-input, .form-select, .form-textarea {
      width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border);
      color:var(--text); padding:10px 12px; border-radius:10px;
      font-family:'Rajdhani',sans-serif; font-size:14px; outline:none; transition:border .2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--pink); }
    .form-select option { background:#12001f; }
    .form-textarea { resize:vertical; min-height:100px; }
    .form-actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .btn-save {
      background:linear-gradient(90deg,var(--pink),var(--purple)); border:none;
      color:#fff; padding:11px 24px; border-radius:10px;
      font-family:'Orbitron',sans-serif; font-size:12px; cursor:pointer; font-weight:700; transition:all .2s;
    }
    .btn-save:hover { box-shadow:var(--glow-pink); }
    .btn-cancel {
      background:transparent; border:1.5px solid var(--border); color:var(--text2);
      padding:10px 20px; border-radius:10px; font-family:'Rajdhani',sans-serif; font-weight:700; cursor:pointer; transition:all .2s;
    }
    .btn-cancel:hover { border-color:var(--text2); }

    /* Список игр */
    .games-table { width:100%; border-collapse:collapse; margin-top:8px; }
    .games-table th {
      text-align:left; padding:10px 12px; border-bottom:1px solid var(--border);
      font-family:'Orbitron',sans-serif; font-size:11px; color:var(--cyan); letter-spacing:1px;
    }
    .games-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px; color:var(--text2); }
    .games-table tr:hover td { background:rgba(255,79,163,0.05); }
    .tbl-title { color:var(--text); font-weight:600; }
    .tbl-pack  { color:var(--cyan); font-size:12px; font-weight:700; }
    .btn-edit  { background:rgba(0,229,255,0.1); border:1px solid var(--cyan); color:var(--cyan); padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer; }
    .btn-del   { background:rgba(248,113,113,0.1); border:1px solid #f87171; color:#f87171; padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer; margin-left:4px; }

    .admin-msg { padding:10px 16px; border-radius:10px; font-size:14px; margin-bottom:16px; }
    .admin-msg.ok  { background:rgba(74,222,128,0.15); border:1px solid #4ade80; color:#4ade80; }
    .admin-msg.err { background:rgba(248,113,113,0.15); border:1px solid #f87171; color:#f87171; }

    .access-denied { text-align:center; padding:80px 20px; }
    .access-denied h2 { font-family:'Orbitron',sans-serif; color:#f87171; font-size:24px; margin-bottom:12px; }

    @media(max-width:600px) { .form-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="bg-wrapper">
  <img class="bg-gif" src="https://media1.tenor.com/m/OBaL_RfkEmwAAAAC/anime-dance.gif" alt="bg" style="display:block"/>
</div>
<div class="bg-overlay"></div>

<div class="admin-wrap">
  <div class="admin-header">
    <div class="admin-title">⚙ АДМИН ПАНЕЛЬ</div>
    <a href="../index.html" class="back-btn" style="text-decoration:none;display:inline-block;background:rgba(255,79,163,0.1);border:1.5px solid var(--pink);color:var(--pink);padding:8px 20px;border-radius:20px;font-family:'Rajdhani',sans-serif;font-weight:700;transition:all .2s;">← На сайт</a>
  </div>

  <div id="accessDenied" class="access-denied" style="display:none">
    <h2>⛔ Доступ запрещён</h2>
    <p style="color:var(--text2)">У тебя нет прав администратора.</p>
    <p style="color:var(--text2);font-size:13px;margin-top:12px">Твой ID: <span id="myIdDisplay" style="color:var(--pink)"></span></p>
    <p style="color:var(--text2);font-size:12px;margin-top:8px">Добавь его в CONFIG.ADMIN_IDS в файле js/config.js</p>
  </div>

  <div id="adminContent" style="display:none">
    <div id="adminMsg" class="admin-msg" style="display:none"></div>

    <div class="admin-tabs">
      <button class="admin-tab active" onclick="showTab('add')">➕ Добавить игру</button>
      <button class="admin-tab" onclick="showTab('list')">📋 Список игр</button>
    </div>

    <!-- ВКЛАДКА ДОБАВИТЬ / РЕДАКТИРОВАТЬ -->
    <div id="tabAdd" class="admin-form">
      <div class="form-title" id="formTitle">➕ Добавить игру</div>
      <input type="hidden" id="editGameId" />
      <div class="form-grid">
        <div class="form-full">
          <label class="form-label">Пак игр</label>
          <select class="form-select" id="fPack">
            <option value="1">Пак игр 1</option>
            <option value="2">Пак игр 2</option>
            <option value="3">Пак игр 3</option>
            <option value="4">Пак игр 4</option>
            <option value="5">Пак игр 5</option>
          </select>
        </div>
        <div class="form-full">
          <label class="form-label">Название игры</label>
          <input type="text" class="form-input" id="fTitle" placeholder="Например: Counter-Strike 2" />
        </div>
        <div class="form-full">
          <label class="form-label">Ссылка на видео (YouTube или mp4)</label>
          <input type="text" class="form-input" id="fVideo" placeholder="https://youtube.com/watch?v=..." />
        </div>
        <div>
          <label class="form-label">Размер / Вес</label>
          <input type="text" class="form-input" id="fSize" placeholder="30 GB" />
        </div>
        <div>
          <label class="form-label">Мультиплеер</label>
          <input type="text" class="form-input" id="fMulti" placeholder="До 32 игроков" />
        </div>
        <div>
          <label class="form-label">Жанр</label>
          <input type="text" class="form-input" id="fGenre" placeholder="FPS, RPG, Action..." />
        </div>
        <div>
          <label class="form-label">Порядок сортировки</label>
          <input type="number" class="form-input" id="fSort" placeholder="1" min="1" />
        </div>
        <div class="form-full">
          <label class="form-label">Описание</label>
          <textarea class="form-textarea" id="fDesc" placeholder="Описание игры..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="saveGame()">💾 Сохранить</button>
        <button class="btn-cancel" onclick="resetForm()">Сбросить</button>
      </div>
    </div>

    <!-- ВКЛАДКА СПИСОК -->
    <div id="tabList" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <span style="color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:14px">СПИСОК ИГР</span>
        <select class="form-select" id="filterPack" onchange="loadAdminGames()" style="width:160px">
          <option value="">Все паки</option>
          <option value="1">Пак 1</option>
          <option value="2">Пак 2</option>
          <option value="3">Пак 3</option>
          <option value="4">Пак 4</option>
          <option value="5">Пак 5</option>
        </select>
      </div>
      <div id="gamesTableWrap">
        <div style="text-align:center;padding:40px;color:var(--text2)">Загрузка...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
// --- Supabase helpers ---
const SUPA_URL = CONFIG.SUPABASE_URL;
const SUPA_KEY = CONFIG.SUPABASE_ANON;

async function supa(path, method='GET', body=null) {
  const h = { 'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'return=representation' };
  const r = await fetch(`${SUPA_URL}${path}`, { method, headers:h, body:body?JSON.stringify(body):null });
  const t = await r.text();
  try { return { ok:r.ok, data:JSON.parse(t) }; } catch { return { ok:r.ok, data:t }; }
}

// --- Проверка доступа ---
document.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('gd_user') || 'null');
  const denied  = document.getElementById('accessDenied');
  const content = document.getElementById('adminContent');

  if (!user) {
    denied.style.display = 'block';
    document.getElementById('myIdDisplay').textContent = 'не авторизован';
    return;
  }

  const isAdmin = CONFIG.ADMIN_IDS.includes(user.site_id) || CONFIG.ADMIN_IDS.includes(user.discord_id);
  document.getElementById('myIdDisplay').textContent = user.site_id;

  if (!isAdmin) {
    denied.style.display = 'block';
  } else {
    content.style.display = 'block';
  }
});

function showTab(t) {
  document.getElementById('tabAdd').style.display  = t==='add'  ? 'block' : 'none';
  document.getElementById('tabList').style.display = t==='list' ? 'block' : 'none';
  document.querySelectorAll('.admin-tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='add')||(i===1&&t==='list')));
  if (t === 'list') loadAdminGames();
}

function showMsg(msg, type='ok') {
  const el = document.getElementById('adminMsg');
  el.textContent = msg; el.className = `admin-msg ${type}`; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

// --- Сохранение игры ---
async function saveGame() {
  const id    = document.getElementById('editGameId').value;
  const pack  = document.getElementById('fPack').value;
  const title = document.getElementById('fTitle').value.trim();
  const video = document.getElementById('fVideo').value.trim();

  if (!title) { showMsg('Введи название!', 'err'); return; }

  const data = {
    pack_number: parseInt(pack),
    title,
    video_url:   video,
    size:        document.getElementById('fSize').value.trim(),
    multiplayer: document.getElementById('fMulti').value.trim(),
    genre:       document.getElementById('fGenre').value.trim(),
    description: document.getElementById('fDesc').value.trim(),
    sort_order:  parseInt(document.getElementById('fSort').value) || 1,
  };

  let res;
  if (id) {
    res = await supa(`/rest/v1/games?id=eq.${id}`, 'PATCH', data);
  } else {
    res = await supa('/rest/v1/games', 'POST', { ...data, created_at: new Date().toISOString() });
  }

  if (res.ok) {
    showMsg(id ? '✅ Игра обновлена!' : '✅ Игра добавлена!');
    resetForm();
  } else {
    showMsg('Ошибка: ' + JSON.stringify(res.data), 'err');
  }
}

function resetForm() {
  document.getElementById('editGameId').value = '';
  document.getElementById('formTitle').textContent = '➕ Добавить игру';
  ['fTitle','fVideo','fSize','fMulti','fGenre','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fSort').value = '';
  document.getElementById('fPack').value = '1';
}

function editGame(g) {
  showTab('add');
  document.getElementById('editGameId').value = g.id;
  document.getElementById('formTitle').textContent = '✏ Редактировать: ' + g.title;
  document.getElementById('fPack').value  = g.pack_number;
  document.getElementById('fTitle').value = g.title;
  document.getElementById('fVideo').value = g.video_url || '';
  document.getElementById('fSize').value  = g.size || '';
  document.getElementById('fMulti').value = g.multiplayer || '';
  document.getElementById('fGenre').value = g.genre || '';
  document.getElementById('fDesc').value  = g.description || '';
  document.getElementById('fSort').value  = g.sort_order || 1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteGame(id, title) {
  if (!confirm(`Удалить "${title}"?`)) return;
  const res = await supa(`/rest/v1/games?id=eq.${id}`, 'DELETE');
  if (res.ok || res.status === 204) { showMsg('🗑 Игра удалена'); loadAdminGames(); }
  else showMsg('Ошибка удаления', 'err');
}

async function loadAdminGames() {
  const pack = document.getElementById('filterPack').value;
  const q = pack ? `&pack_number=eq.${pack}` : '';
  const res = await supa(`/rest/v1/games?order=pack_number.asc,sort_order.asc${q}&select=*`);
  const wrap = document.getElementById('gamesTableWrap');

  if (!res.ok || !Array.isArray(res.data) || res.data.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">Игр нет</div>';
    return;
  }

  wrap.innerHTML = `<table class="games-table">
    <thead><tr><th>#</th><th>Название</th><th>Пак</th><th>Жанр</th><th>Действия</th></tr></thead>
    <tbody>${res.data.map(g => `
      <tr>
        <td style="color:var(--text2)">${g.sort_order}</td>
        <td class="tbl-title">${escHtml(g.title)}</td>
        <td class="tbl-pack">Пак ${g.pack_number}</td>
        <td>${escHtml(g.genre||'—')}</td>
        <td>
          <button class="btn-edit" onclick="editGame(${JSON.stringify(g).replace(/"/g,'&quot;')})">✏ Ред.</button>
          <button class="btn-del"  onclick="deleteGame(${g.id},'${escHtml(g.title)}')">🗑 Удал.</button>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
